<?xml version="1.0" encoding="utf-8"?>
<!-- Robot face: bubble with tail tip on the left, two eyes, round-dot ears, antenna (green) -->
<svg width="800px" height="800px" viewBox="-2 -4 28 30" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Conversation bubble: tail tip on the left, base centered (thinner stroke) -->
  <path d="M5 3 L19 3 Q21 3 21 5 L21 15 Q21 17 19 17 L14 17 L9 21 L10 17 L5 17 Q3 17 3 15 L3 5 Q3 3 5 3 Z" stroke="#16a34a" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Robot hair: longer antenna, circle same size -->
  <line x1="12" y1="3" x2="12" y2="-1.5" stroke="#16a34a" stroke-width="1.25" stroke-linecap="round"/>
  <circle cx="12" cy="-1.5" r="1.5" fill="#16a34a"/>
  <!-- Ears (round dots) -->
  <circle cx="2" cy="10" r="1.5" fill="#16a34a"/>
  <circle cx="22" cy="10" r="1.5" fill="#16a34a"/>
  <!-- Eyes: bigger, spaced apart -->
  <circle cx="8.5" cy="10" r="1.6" fill="#16a34a"/>
  <circle cx="15.5" cy="10" r="1.6" fill="#16a34a"/>
</svg>
